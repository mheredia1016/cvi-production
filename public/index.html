<!doctype html>
<html>
<head>
  <meta charset="utf-8"><title>PWT ProductionOS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="layout">
  <aside class="side">
    <div class="brand">PWT ProductionOS</div>
    <a href="/" class="active">🖨️ Print Station</a>
    <a href="/backend.html">🧠 Backend Control</a>
    <a href="/shipping.html">📦 Shipping Scan</a>
    <a href="/barcodes.html">🏷️ Barcode Sheets</a>
  </aside>
  <main class="main">
    <div class="topbar"><div><h1>Print Station</h1><p>Graphics Lab Queue • Printer 1</p></div><div id="clock"></div></div>
    <div class="scan"><input id="scanInput" placeholder="Scan ShipStation barcode / order number" autofocus><small>Demo order: 10031</small></div>
    <div class="grid">
      <section class="card" id="orderPanel"><div class="empty">Scan an order to load print items.</div></section>
      <section class="card"><h2>Station Activity</h2><div id="activity" class="muted">No jobs queued yet.</div></section>
    </div>
  </main>
</div>
<script src="/app.js"></script>
</body>
</html>
