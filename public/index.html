<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>Print</title><link rel="stylesheet" href="/styles.css"></head><body><div class="layout"><aside class="side"><div class="brand">ProductionOS</div><a class="" href="/dashboard.html">Dashboard</a><a class="" href="/backend.html">Backend Control</a><a class="" href="/piece-labels.html">Piece Labels</a><a class="active" href="/">Print Station</a><a class="" href="/qc.html">QC</a><a class="" href="/shipping.html">Shipping</a><a class="" href="/tracking.html">Tracking</a></aside><main class="main"><h1>Print Station</h1><div class="scan"><input id="scan" placeholder="Scan piece ID, example 14540601" autofocus></div><div class="grid"><div class="card" id="panel">Scan a piece.</div><div class="card" id="activity">No activity.</div></div><script>let p;scan.onkeydown=e=>{if(e.key==='Enter')load()};async function load(){let r=await fetch('/api/piece/'+scan.value.trim());if(!r.ok){panel.innerHTML='<p class="error">Not found</p>';return}let d=await r.json();p=d.piece;panel.innerHTML=`<h2>Piece ${p.pieceId}</h2><p>Order ${p.orderNumber} • Unit ${p.unitNumber}/${p.unitCount}</p><div class="piece"><div class="art"><img src="${p.artworkUrl}"></div><div><h3>${p.productType} ${p.location}</h3><p>${p.garment} • ${p.color} • ${p.size}</p><p>${p.printer} • Pretreat ${p.pretreat}</p><p>Status: ${p.status}</p><button onclick="send()">Send to Graphics Lab</button><button class="ok" onclick="status('printed')">Mark Printed</button><button class="secondary" onclick="status('cured')">Mark Cured</button></div></div>`}async function send(){let r=await fetch('/api/piece/'+p.pieceId+'/send',{method:'POST'}),d=await r.json();activity.innerHTML=d.message||d.error;load()}async function status(s){await fetch('/api/piece/'+p.pieceId+'/status',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:s})});load()}</script></main></div></body></html>
