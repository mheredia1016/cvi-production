<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>Tracking</title><link rel="stylesheet" href="/styles.css"></head><body><div class="layout"><aside class="side"><div class="brand">ProductionOS</div><a class="" href="/dashboard.html">Dashboard</a><a class="" href="/backend.html">Backend Control</a><a class="" href="/piece-labels.html">Piece Labels</a><a class="" href="/">Print Station</a><a class="" href="/qc.html">QC</a><a class="" href="/shipping.html">Shipping</a><a class="active" href="/tracking.html">Tracking</a></aside><main class="main"><h1>Piece Tracking</h1><div class="card" id="events"></div><script>async function load(){let e=await(await fetch('/api/events')).json();events.innerHTML='<table>'+e.map(x=>`<tr><td>${new Date(x.at).toLocaleString()}</td><td>${x.orderNumber}</td><td>${x.pieceId||''}</td><td>${x.message}</td></tr>`).join('')+'</table>'}load()</script></main></div></body></html>
