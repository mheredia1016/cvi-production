<!doctype html><html><head><meta charset="utf-8"><title>QC Scan</title><meta name="viewport" content="width=device-width, initial-scale=1"><link rel="stylesheet" href="/styles.css"></head><body><div class="layout"><aside class="side"><div class="brand">ProductionOS</div><a href="/dashboard.html" class="">📊 Dashboard</a><a href="/backend.html" class="">🧠 Backend Control</a><a href="/barcodes.html" class="">🏷️ Barcode Work Orders</a><a href="/" class="">🖨️ Print Station</a><a href="/qc.html" class="active">✅ QC Scan</a><a href="/shipping.html" class="">📦 Shipping Scan</a><a href="/tracking.html" class="">🔎 Tracking</a></aside><main class="main">
<div class="topbar"><div><h1>Quality Control</h1><p>Scan barcode, pass items or reject and create a reprint job.</p></div></div>
<div class="scan"><input id="scan" placeholder="Scan barcode, example POS-581001" autofocus></div>
<section class="card" id="panel"><div class="empty">Scan an order barcode.</div></section>
<script>
let order;
scan.addEventListener('keydown',e=>{if(e.key==='Enter')load();});
async function load(){
 const r=await fetch('/api/order/'+encodeURIComponent(scan.value.trim()));
 if(!r.ok){panel.innerHTML='<div class="error">Order not found.</div>';return;}
 order=await r.json();
 panel.innerHTML=`<h2>Order #${order.orderNumber}</h2><p class="muted">${order.customer} • Bin: ${order.binStatus}</p>`+
 '<table><tr><th>Item</th><th>Status</th><th>Actions</th></tr>'+order.items.map(i=>`<tr><td>${i.location} — ${i.garment} ${i.color} ${i.size}<br><small>${i.sku}</small></td><td>${i.status}</td><td><button class="ok" onclick="passItem('${i.id}')">QC Pass</button><button class="danger" onclick="rejectItem('${i.id}')">Reject/Reprint</button></td></tr>`).join('')+'</table>';
}
async function passItem(itemId){await fetch('/api/items/status',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({barcode:order.barcode,itemId,status:'qc_passed'})});load();}
async function rejectItem(itemId){const reason=prompt('Reject reason','Crooked print')||'QC Reject';await fetch('/api/qc/reject',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({barcode:order.barcode,itemId,reason})});load();}
</script>
</main></div></body></html>
