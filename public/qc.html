<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>QC</title><link rel="stylesheet" href="/styles.css"></head><body><div class="layout"><aside class="side"><div class="brand">ProductionOS</div><a class="" href="/dashboard.html">Dashboard</a><a class="" href="/backend.html">Backend Control</a><a class="" href="/piece-labels.html">Piece Labels</a><a class="" href="/">Print Station</a><a class="active" href="/qc.html">QC</a><a class="" href="/shipping.html">Shipping</a><a class="" href="/tracking.html">Tracking</a></aside><main class="main"><h1>QC Scan</h1><div class="scan"><input id="scan" placeholder="Scan piece ID" autofocus></div><div class="card" id="panel">Scan a piece.</div><script>let p;scan.onkeydown=e=>{if(e.key==='Enter')load()};async function load(){let r=await fetch('/api/piece/'+scan.value.trim());if(!r.ok)return panel.innerHTML='Not found';p=(await r.json()).piece;panel.innerHTML=`<h2>Piece ${p.pieceId}</h2><p>${p.productType} ${p.location} • ${p.color} ${p.size}</p><p>Status ${p.status}</p><button class="ok" onclick="pass()">QC Pass</button><button class="danger" onclick="reject()">Reject + Reprint</button>`}async function pass(){await fetch('/api/piece/'+p.pieceId+'/status',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:'qc_passed'})});load()}async function reject(){let reason=prompt('Reason','Crooked print');let d=await(await fetch('/api/piece/'+p.pieceId+'/reject',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({reason})})).json();alert(d.message);scan.value=d.replacement.pieceId;load()}</script></main></div></body></html>
