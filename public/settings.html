<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Settings</title><link rel="stylesheet" href="/styles.css"></head><body><div class="layout"><aside class="side"><div class="brand">ProductionOS</div><a href="/daily.html" class="">📋 Daily Manager</a><a href="/stores.html" class="">🏪 Stores</a><a href="/settings.html" class="active">⚙️ Settings</a><a href="/printer-test.html">🖨️ Printer Scan Test</a><a href="/history.html" class="">🖨️ Print History</a></aside><main class="main"><div class="shadow">SHADOW MODE — Read-only. Linx remains in control.</div>
<h1>Production Settings</h1>
<section class="card">
  <h2>Manager Label Print Order</h2>
  <p class="muted">One category per line. Rush should normally stay first.</p>
  <textarea id="printOrder" style="width:100%;min-height:320px;background:#0f1420;color:#fff;border:1px solid #36435f;border-radius:10px;padding:12px"></textarea>
  <br><br>
  <button onclick="save()">Save Print Order</button>
  <div id="msg"></div>
</section>
<script>
async function load(){
  const data=await (await fetch('/api/settings')).json();
  printOrder.value=(data.printOrder||[]).join('\n');
}

async function save(){
  const order=printOrder.value.split('\n').map(value=>value.trim()).filter(Boolean);

  const response=await fetch('/api/settings/print-order',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({printOrder:order})
  });
  const data=await response.json();

  msg.innerHTML='<div class="success">✓ Saved '+data.printOrder.length+' categories.</div>';
}
load();
</script>
</main></div></body></html>
