<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Store Selection</title><link rel="stylesheet" href="/styles.css"></head><body><div class="layout"><aside class="side"><div class="brand">ProductionOS</div><a href="/stores.html" class="active">🏪 Store Selection</a><a href="/backend.html" class="">🧠 Shadow Import</a><a href="/pieces.html" class="">🏷️ Shadow Pieces</a></aside><main class="main"><div class="shadow">SHADOW MODE — ShipStation is read-only. Linx remains in control.</div>
<h1>ShipStation Store Selection</h1><p class="muted">Only checked stores will be included in ProductionOS previews and shadow imports.</p>
<div class="card"><div id="stores">Loading stores...</div><button onclick="save()">Save Enabled Stores</button><div id="msg"></div></div>
<script>
async function load(){
 const r=await fetch('/api/stores');const d=await r.json();
 if(!r.ok){stores.innerHTML='<div class="error">'+d.error+'</div>';return;}
 stores.innerHTML='<table><tr><th>Use</th><th>Store</th><th>Marketplace</th><th>Store ID</th></tr>'+d.map(s=>`<tr><td><input type="checkbox" class="store" value="${s.storeId}" ${s.enabled?'checked':''}></td><td>${s.storeName}</td><td>${s.marketplaceName||''}</td><td>${s.storeId}</td></tr>`).join('')+'</table>';
}
async function save(){
 const ids=[...document.querySelectorAll('.store:checked')].map(x=>Number(x.value));
 const r=await fetch('/api/stores/enabled',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({storeIds:ids})});
 const d=await r.json();msg.innerHTML='<div class="success">✓ Saved '+ids.length+' enabled stores.</div><p class="muted">'+d.warning+'</p>';
}
load();
</script>
</main></div></body></html>
