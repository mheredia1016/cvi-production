<!doctype html><html><head><meta charset="utf-8"><title>Barcode Work Orders</title><meta name="viewport" content="width=device-width, initial-scale=1"><link rel="stylesheet" href="/styles.css"><link href="https://fonts.googleapis.com/css2?family=Libre+Barcode+39&display=swap" rel="stylesheet"></head><body><div class="layout"><aside class="side"><div class="brand">ProductionOS</div><a href="/dashboard.html" class="">📊 Dashboard</a><a href="/backend.html" class="">🧠 Backend Control</a><a href="/barcodes.html" class="active">🏷️ Barcode Work Orders</a><a href="/" class="">🖨️ Print Station</a><a href="/qc.html" class="">✅ QC Scan</a><a href="/shipping.html" class="">📦 Shipping Scan</a><a href="/tracking.html" class="">🔎 Tracking</a></aside><main class="main">
<div class="topbar no-print"><div><h1>Barcode Work Orders</h1><p>Print these on the backend computer and send with garments.</p></div><button onclick="window.print()">Print</button></div>
<section class="card" id="cards">Import a batch first.</section>
<script>
async function load(){
 const orders=await (await fetch('/api/orders')).json();
 cards.innerHTML=orders.length?orders.map(o=>`<div class="barcode-card"><div class="label-title">Order #${o.orderNumber}</div><div>${o.store} ${o.rush?'<b style="color:red">RUSH</b>':''}</div><div class="barcode">*${o.barcode}*</div><div><b>${o.barcode}</b></div><div>${o.customer}</div><hr>${o.items.map(i=>`<div><b>${i.location}</b> — ${i.garment} ${i.color} ${i.size} Qty ${i.qty}<br><small>${i.path} • Pretreat: ${i.pretreat} • ${i.cure}</small><br><small>SKU: ${i.sku}</small></div>`).join('<br>')}</div>`).join(''):'No imported orders yet.';
}
load();
</script>
</main></div></body></html>
