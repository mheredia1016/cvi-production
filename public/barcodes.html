<!doctype html><html><head><meta charset="utf-8"><title>Barcode Sheets</title><meta name="viewport" content="width=device-width, initial-scale=1"><link rel="stylesheet" href="/styles.css"><link href="https://fonts.googleapis.com/css2?family=Libre+Barcode+39&display=swap" rel="stylesheet"></head><body><div class="layout"><aside class="side"><div class="brand">PWT ProductionOS</div><a href="/">🖨️ Print Station</a><a href="/backend.html">🧠 Backend Control</a><a href="/shipping.html">📦 Shipping Scan</a><a href="/barcodes.html" class="active">🏷️ Barcode Sheets</a></aside><main class="main"><div class="topbar no-print"><div><h1>Barcode Work Orders</h1><p>Print these from the backend computer</p></div><button onclick="window.print()">Print Barcodes</button></div><section class="card" id="cards">Loading...</section></main></div><script>async function load(){const r=await fetch('/api/orders');const orders=await r.json();cards.innerHTML=orders.map(o=>`<div class="barcode-card"><div class="label-title">Order #${o.orderNumber}</div><div>${o.store}</div><div class="barcode">*${o.orderNumber}*</div><div>${o.customer}</div>${o.rush?'<div style="color:red;font-weight:800">RUSH</div>':''}<hr>${o.items.map(i=>`<div><b>${i.location}</b> — ${i.garment} ${i.color} ${i.size} Qty ${i.qty}<br><small>SKU: ${i.sku}</small></div>`).join('<br>')}</div>`).join('');}load();</script></body></html>
