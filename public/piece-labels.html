<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>Labels</title><link rel="stylesheet" href="/styles.css"><link href="https://fonts.googleapis.com/css2?family=Libre+Barcode+39&display=swap" rel="stylesheet"></head><body><div class="layout"><aside class="side"><div class="brand">ProductionOS</div><a class="" href="/dashboard.html">Dashboard</a><a class="" href="/backend.html">Backend Control</a><a class="active" href="/piece-labels.html">Piece Labels</a><a class="" href="/">Print Station</a><a class="" href="/qc.html">QC</a><a class="" href="/shipping.html">Shipping</a><a class="" href="/tracking.html">Tracking</a></aside><main class="main"><div class="no-print"><h1>Piece Labels</h1><button onclick="print()">Print</button></div><div class="card"><div id="labels" class="label-grid"></div></div><script>async function load(){let ps=await(await fetch('/api/pieces')).json();labels.innerHTML=ps.filter(p=>!p.isSuperseded).map(p=>`<div class="piece-label ${p.productType.toLowerCase().includes('dtf')?'dtf':''}"><div class="barcode">*${p.pieceId}*</div><div class="pieceid">${p.pieceId}</div><h2>${p.productType} • ${p.location}</h2><div class="label-meta"><div><b>Order</b>${p.orderNumber}</div><div><b>Unit</b>${p.unitNumber} of ${p.unitCount}</div><div><b>Product</b>${p.garment}</div><div><b>Color / Size</b>${p.color} / ${p.size}</div><div><b>Printer</b>${p.printer}</div><div><b>Pretreat</b>${p.pretreat}</div></div><p><b>SKU:</b> ${p.sku}</p></div>`).join('')||'Import orders first'}load()</script></main></div></body></html>
