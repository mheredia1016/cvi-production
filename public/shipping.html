<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>Shipping</title><link rel="stylesheet" href="/styles.css"></head><body><div class="layout"><aside class="side"><div class="brand">ProductionOS</div><a class="" href="/dashboard.html">Dashboard</a><a class="" href="/backend.html">Backend Control</a><a class="" href="/piece-labels.html">Piece Labels</a><a class="" href="/">Print Station</a><a class="" href="/qc.html">QC</a><a class="active" href="/shipping.html">Shipping</a><a class="" href="/tracking.html">Tracking</a></aside><main class="main"><h1>Shipping</h1><div class="scan"><input id="scan" placeholder="Scan/type order AEW165074" autofocus></div><div class="card" id="panel">Scan an order.</div><script>let o;scan.onkeydown=e=>{if(e.key==='Enter')load()};async function load(){let r=await fetch('/api/order/'+scan.value.trim());if(!r.ok)return panel.innerHTML='Not found';o=await r.json();let a=o.pieces.filter(p=>!p.isSuperseded),ready=a.every(p=>p.status==='qc_passed');panel.innerHTML=`<h2>${o.orderNumber}</h2><p>${ready?'<span class="success">Ready to ship</span>':'<span class="error">Incomplete</span>'}</p><table>${a.map(p=>`<tr><td>${p.pieceId}</td><td>${p.productType} ${p.location}</td><td>${p.status}</td></tr>`).join('')}</table><button ${ready?'':'disabled'} onclick="ship()">Mark Shipped</button>`}async function ship(){let r=await fetch('/api/order/'+o.orderNumber+'/ship',{method:'POST'}),d=await r.json();if(!r.ok)alert(d.error);load()}</script></main></div></body></html>
