<!doctype html><html><head><meta charset="utf-8"><title>Shipping Scan</title><meta name="viewport" content="width=device-width, initial-scale=1"><link rel="stylesheet" href="/styles.css"></head><body><div class="layout"><aside class="side"><div class="brand">PWT ProductionOS</div><a href="/">🖨️ Print Station</a><a href="/backend.html">🧠 Backend Control</a><a href="/shipping.html" class="active">📦 Shipping Scan</a><a href="/barcodes.html">🏷️ Barcode Sheets</a></aside><main class="main"><div class="topbar"><div><h1>Shipping Scan</h1><p>Scan order barcode before packing/shipping</p></div></div><div class="scan"><input id="scan" placeholder="Scan order barcode" autofocus></div><section class="card" id="result"><div class="empty">Scan an order to verify production status.</div></section></main></div><script>scan.addEventListener('keydown',e=>{if(e.key==='Enter')load();});async function load(){const r=await fetch('/api/order/'+scan.value.trim());if(!r.ok){result.innerHTML='<div class="error">Order not found</div>';return;}const o=await r.json();result.innerHTML=`<h2>Order #${o.orderNumber}</h2><p>${o.customer} • ${o.store}</p><p>Status: <b>${o.status}</b></p><table><tr><th>Item</th><th>SKU</th><th>Garment</th><th>Qty</th></tr>${o.items.map(i=>`<tr><td>${i.title}</td><td>${i.sku}</td><td>${i.garment} ${i.color} ${i.size}</td><td>${i.qty}</td></tr>`).join('')}</table><button onclick="alert('Shipping verification status will be added next.')">Mark Ready to Ship</button>`;}</script></body></html>
