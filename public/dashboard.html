<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>Dashboard</title><link rel="stylesheet" href="/styles.css"></head><body><div class="layout"><aside class="side"><div class="brand">ProductionOS</div><a class="active" href="/dashboard.html">Dashboard</a><a class="" href="/backend.html">Backend Control</a><a class="" href="/piece-labels.html">Piece Labels</a><a class="" href="/">Print Station</a><a class="" href="/qc.html">QC</a><a class="" href="/shipping.html">Shipping</a><a class="" href="/tracking.html">Tracking</a></aside><main class="main"><h1>Piece-Level Dashboard</h1><div class="card"><p>Start at <a class="button" href="/backend.html">Backend Control</a>.</p><p>Import orders, print piece labels, then scan piece IDs at Print and QC.</p></div><div class="card" id="data"></div><script>async function load(){let o=await(await fetch('/api/orders')).json(),p=await(await fetch('/api/pieces')).json();data.innerHTML=`<h2>${o.length} Orders • ${p.filter(x=>!x.isSuperseded).length} Active Pieces</h2><table>${o.map(x=>`<tr><td>${x.orderNumber}</td><td>${x.productionStatus}</td><td>${x.binStatus}</td><td>${x.pieces.length} pieces</td></tr>`).join('')}</table>`}load();setInterval(load,3000)</script></main></div></body></html>
