<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Daily Manager</title><link rel="stylesheet" href="/styles.css"><link href="https://fonts.googleapis.com/css2?family=Libre+Barcode+39&display=swap" rel="stylesheet"></head><body><div class="layout"><aside class="side"><div class="brand">ProductionOS</div><a href="/daily.html" class="active">📋 Daily Manager</a><a href="/stores.html" class="">🏪 Stores</a><a href="/settings.html" class="">⚙️ Settings</a><a href="/history.html" class="">🖨️ Print History</a></aside><main class="main"><div class="shadow">SHADOW MODE — Read-only. Linx remains in control.</div>
<h1>Manager Daily Tasks</h1>
<section class="card no-print">
<div class="row">
<label>Production Date<input type="date" id="date"></label>
<button onclick="preview()">1. Preview In Production</button>
<button onclick="doImport()">2. Shadow Import</button>
<button class="secondary" onclick="loadAll()">Refresh</button>
<button class="secondary" onclick="printGarmentReport()">Print Garment Report</button>
</div><div id="msg"></div>
</section>
<section class="cards" id="metrics"></section>
<section class="card no-print"><h2>Daily Label Queue</h2><div id="queue" class="queue"></div></section>
<section class="card no-print"><h2>Order Preview</h2><div id="previewBox">Click Preview.</div></section>
<section class="card"><div id="labels"></div></section>
<section class="card"><h2>Garment Report</h2><div id="garments">No data.</div></section>
<script>
let current=[];
let currentCategory='';
let currentStock='white';
let printOrder=[];

function yesterday(){
  const d=new Date();
  d.setDate(d.getDate()-1);
  return d.toISOString().slice(0,10);
}
date.value=yesterday();

async function preview(){
  const response=await fetch('/api/manager/preview?date='+date.value);
  const data=await response.json();

  if(!response.ok){
    previewBox.innerHTML='<div class="error">'+data.error+'</div>';
    return;
  }

  previewBox.innerHTML=
    `<p><b>${data.included.length}</b> included, <b>${data.excluded.length}</b> excluded.</p>`+
    `<table><tr><th>Order</th><th>Store</th><th>Rush</th><th>Backend Product Info</th></tr>`+
    data.included.map(order=>`<tr><td>${order.orderNumber}</td><td>${order.storeName}</td><td>${order.customField1||''}</td><td>${order.items.map(item=>item.backendProductInfo).join(', ')}</td></tr>`).join('')+
    `</table>`;
}

async function doImport(){
  const response=await fetch('/api/manager/shadow-import',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({date:date.value})
  });
  const data=await response.json();

  msg.innerHTML=response.ok
    ? '<div class="success">✓ '+data.message+'</div>'
    : '<div class="error">'+data.error+'</div>';

  loadAll();
}

async function loadSettings(){
  const data=await (await fetch('/api/settings')).json();
  printOrder=data.printOrder||[];
}

async function loadSummary(){
  const data=await (await fetch('/api/manager/summary?date='+date.value)).json();

  metrics.innerHTML=[
    ['Total Labels',data.total],
    ['Rush',data.rush],
    ['Regular',data.regular],
    ['Unprinted',data.unprinted]
  ].map(item=>`<div class="metric"><span class="muted">${item[0]}</span><br><b>${item[1]}</b></div>`).join('');

  const counts=new Map(data.byType.map(entry=>[entry.type,entry.unprinted]));
  const cards=printOrder.map(type=>({
    type,
    count:type==='Rush / Skip The Line' ? data.rush : (counts.get(type)||0),
    rush:type==='Rush / Skip The Line'
  }));

  queue.innerHTML=cards.map(card=>`<div class="queue-card ${card.count===0?'done':''}">
    <b>${card.type}</b>
    <p>${card.count} unprinted</p>
    <button ${card.count===0?'disabled':''} onclick='openGroup(${JSON.stringify(card.type)},${card.rush})'>Open</button>
  </div>`).join('');
}

async function openGroup(type,isRush){
  currentCategory=type;
  currentStock=isRush?'red':'white';

  let url='/api/manager/labels?date='+date.value+'&unprinted=true&rush='+(isRush?'true':'false');
  if(!isRush) url+='&type='+encodeURIComponent(type);

  current=await (await fetch(url)).json();

  labels.innerHTML=
    `<div class="no-print"><h2>${type}</h2><p>${current.length} labels • ${currentStock.toUpperCase()} stock</p>`+
    `<button onclick="printLabelsOnly()">Print Labels</button> `+
    `<button class="secondary" onclick="markPrinted()">Mark Printed</button></div>`+
    current.map(thermalLabelHtml).join('');
}


function escapeHtml(value){
  return String(value ?? '')
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'",'&#039;');
}

function thermalLabelHtml(piece){
  return `<div class="thermal">
    <div class="top"><span>${piece.rush?'RUSH — SKIP THE LINE':escapeHtml(piece.orderNumber)}</span><span>${escapeHtml(piece.orderNumber)}</span></div>
    <div class="middle">
      <div><div class="barcode">*${escapeHtml(piece.pieceId)}*</div><div class="piece">${escapeHtml(piece.pieceId)}</div></div>
      <div class="type">${escapeHtml(piece.backendProductInfo)}<br>${piece.unitNumber} OF ${piece.unitCount}</div>
    </div>
    <div class="bottom">
      <span>${escapeHtml(piece.style || piece.garment)} • ${escapeHtml(piece.color)} • ${escapeHtml(piece.size)}</span>
      <span>${escapeHtml(piece.oldSku)}${piece.requiresBack?' / BACK':''}</span>
    </div>
  </div>`;
}

function printLabelsOnly(){
  if(!current.length){
    alert('No labels loaded.');
    return;
  }

  const popup=window.open('', '_blank', 'width=900,height=700');
  if(!popup){
    alert('Please allow pop-ups for this site so labels can print by themselves.');
    return;
  }

  popup.document.write(`<!doctype html><html><head><meta charset="utf-8"><title>${escapeHtml(currentCategory)} Labels</title>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Barcode+39&display=swap" rel="stylesheet">
    <style>
      @page{size:3in 1in;margin:0}
      *{box-sizing:border-box}
      html,body{margin:0;padding:0;background:#fff}
      .thermal{width:3in;height:1in;background:#fff;color:#000;padding:.05in .07in;overflow:hidden;page-break-after:always;break-after:page;font-family:Arial,sans-serif}
      .top{font-size:10px;font-weight:900;display:flex;justify-content:space-between;white-space:nowrap}
      .middle{display:flex;justify-content:space-between;align-items:center}
      .barcode{font-family:'Libre Barcode 39',monospace;font-size:32px;line-height:.75;white-space:nowrap}
      .piece{font-size:11px;font-weight:900}
      .type{text-align:right;font-size:10px;font-weight:900;line-height:1.05}
      .bottom{font-size:7.5px;font-weight:700;display:flex;justify-content:space-between;gap:6px;white-space:nowrap}
    </style></head><body>${current.map(thermalLabelHtml).join('')}</body></html>`);
  popup.document.close();
  popup.focus();
  setTimeout(()=>popup.print(),700);
}

async function printGarmentReport(){
  const rows=await (await fetch('/api/manager/garments?date='+date.value)).json();
  if(!rows.length){
    alert('No garment data for this date.');
    return;
  }

  const total=rows.reduce((sum,row)=>sum+Number(row.qty||0),0);
  const popup=window.open('', '_blank', 'width=1000,height=800');
  if(!popup){
    alert('Please allow pop-ups for this site so the garment report can print by itself.');
    return;
  }

  const created=new Date().toLocaleString();
  popup.document.write(`<!doctype html><html><head><meta charset="utf-8"><title>Picklist ${escapeHtml(date.value)}</title>
    <style>
      @page{size:letter portrait;margin:.45in}
      body{font-family:Arial,sans-serif;color:#000;margin:0}
      .head{text-align:center;margin-bottom:16px}
      .head h1{font-size:19px;margin:0 0 5px}
      .meta{font-size:12px;font-weight:700}
      .total{text-align:right;font-size:24px;font-weight:900;margin:6px 10px}
      table{width:100%;border-collapse:collapse;font-size:11px}
      th{background:#bdbdbd;text-align:center;padding:4px;border-bottom:1px solid #555}
      td{padding:4px 6px;border-bottom:1px solid #999}
      tbody tr:nth-child(even){background:#e6e6e6}
      td:last-child,th:last-child{text-align:center;width:55px;font-weight:700}
    </style></head><body>
    <div class="head"><h1>PICKLIST</h1><div class="meta">Production Date: ${escapeHtml(date.value)} &nbsp; | &nbsp; Created: ${escapeHtml(created)}</div></div>
    <div class="total">TOTAL: ${total}</div>
    <table><thead><tr><th>STYLE</th><th>COLOR</th><th>SIZE</th><th>TYPE</th><th>QTY</th></tr></thead><tbody>
    ${rows.map(row=>`<tr><td>${escapeHtml(row.style)}</td><td>${escapeHtml(row.color)}</td><td>${escapeHtml(row.size)}</td><td>${escapeHtml(row.type)}</td><td>${row.qty}</td></tr>`).join('')}
    </tbody></table></body></html>`);
  popup.document.close();
  popup.focus();
  setTimeout(()=>popup.print(),300);
}

async function markPrinted(){
  const data=await (await fetch('/api/manager/mark-printed',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      pieceIds:current.map(piece=>piece.pieceId),
      category:currentCategory,
      labelStock:currentStock
    })
  })).json();

  msg.innerHTML='<div class="success">✓ '+data.message+'</div>';
  labels.innerHTML='';
  loadAll();
}

async function loadGarments(){
  const rows=await (await fetch('/api/manager/garments?date='+date.value)).json();

  garments.innerHTML=rows.length
    ? '<table><tr><th>Style</th><th>Color</th><th>Size</th><th>Type</th><th>Qty</th></tr>'+
      rows.map(row=>`<tr><td>${row.style}</td><td>${row.color}</td><td>${row.size}</td><td>${row.type}</td><td><b>${row.qty}</b></td></tr>`).join('')+
      '</table>'
    : 'No garment data.';
}

async function loadAll(){
  await loadSettings();
  await Promise.all([loadSummary(),loadGarments()]);
}

preview();
loadAll();
</script>
</main></div></body></html>
