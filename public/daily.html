<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Daily Manager</title><link rel="stylesheet" href="/styles.css"><link href="https://fonts.googleapis.com/css2?family=Libre+Barcode+39&display=swap" rel="stylesheet"></head><body><div class="layout"><aside class="side"><div class="brand">ProductionOS</div><a href="/daily.html" class="active">📋 Daily Manager</a><a href="/stores.html" class="">🏪 Stores</a><a href="/settings.html" class="">⚙️ Settings</a><a href="/history.html" class="">🖨️ Print History</a></aside><main class="main"><div class="shadow">SHADOW MODE — Read-only. Linx remains in control.</div>
<h1>Manager Daily Tasks</h1>
<section class="card no-print">
<div class="row">
<label>Production Date<input type="date" id="date"></label>
<button onclick="preview()">1. Preview In Production</button>
<button onclick="doImport()">2. Shadow Import</button>
<button class="secondary" onclick="loadAll()">Refresh</button>
<button class="secondary" onclick="loadGarments()">Load Garment Report</button>
</div><div id="msg"></div>
</section>
<section class="cards" id="metrics"></section>
<section class="card no-print"><h2>Daily Label Queue</h2><div id="queue" class="queue"></div></section>
<section class="card no-print"><h2>Order Preview</h2><div id="previewBox">Click Preview.</div></section>
<section class="card"><div id="labels"></div></section>
<section class="card"><h2>Garment Report</h2><div id="garments">No data.</div></section>
<script>
let current=[];
let currentCategory='';
let currentStock='white';
let printOrder=[];

function yesterday(){
  const d=new Date();
  d.setDate(d.getDate()-1);
  return d.toISOString().slice(0,10);
}
date.value=yesterday();

async function preview(){
  const response=await fetch('/api/manager/preview?date='+date.value);
  const data=await response.json();

  if(!response.ok){
    previewBox.innerHTML='<div class="error">'+data.error+'</div>';
    return;
  }

  previewBox.innerHTML=
    `<p><b>${data.included.length}</b> included, <b>${data.excluded.length}</b> excluded.</p>`+
    `<table><tr><th>Order</th><th>Store</th><th>Rush</th><th>Backend Product Info</th></tr>`+
    data.included.map(order=>`<tr><td>${order.orderNumber}</td><td>${order.storeName}</td><td>${order.customField1||''}</td><td>${order.items.map(item=>item.backendProductInfo).join(', ')}</td></tr>`).join('')+
    `</table>`;
}

async function doImport(){
  const response=await fetch('/api/manager/shadow-import',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({date:date.value})
  });
  const data=await response.json();

  msg.innerHTML=response.ok
    ? '<div class="success">✓ '+data.message+'</div>'
    : '<div class="error">'+data.error+'</div>';

  loadAll();
}

async function loadSettings(){
  const data=await (await fetch('/api/settings')).json();
  printOrder=data.printOrder||[];
}

async function loadSummary(){
  const data=await (await fetch('/api/manager/summary?date='+date.value)).json();

  metrics.innerHTML=[
    ['Total Labels',data.total],
    ['Rush',data.rush],
    ['Regular',data.regular],
    ['Unprinted',data.unprinted]
  ].map(item=>`<div class="metric"><span class="muted">${item[0]}</span><br><b>${item[1]}</b></div>`).join('');

  const counts=new Map(data.byType.map(entry=>[entry.type,entry.unprinted]));
  const cards=printOrder.map(type=>({
    type,
    count:type==='Rush / Skip The Line' ? data.rush : (counts.get(type)||0),
    rush:type==='Rush / Skip The Line'
  }));

  queue.innerHTML=cards.map(card=>`<div class="queue-card ${card.count===0?'done':''}">
    <b>${card.type}</b>
    <p>${card.count} unprinted</p>
    <button ${card.count===0?'disabled':''} onclick='openGroup(${JSON.stringify(card.type)},${card.rush})'>Open</button>
  </div>`).join('');
}

async function openGroup(type,isRush){
  currentCategory=type;
  currentStock=isRush?'red':'white';

  let url='/api/manager/labels?date='+date.value+'&unprinted=true&rush='+(isRush?'true':'false');
  if(!isRush) url+='&type='+encodeURIComponent(type);

  current=await (await fetch(url)).json();

  labels.innerHTML=
    `<div class="no-print"><h2>${type}</h2><p>${current.length} labels • ${currentStock.toUpperCase()} stock</p>`+
    `<button onclick="window.print()">Print</button> `+
    `<button class="secondary" onclick="markPrinted()">Mark Printed</button></div>`+
    current.map(piece=>`<div class="thermal">
      <div class="top"><span>${piece.rush?'RUSH — SKIP THE LINE':piece.orderNumber}</span><span>${piece.orderNumber}</span></div>
      <div class="middle">
        <div><div class="barcode">*${piece.pieceId}*</div><div class="piece">${piece.pieceId}</div></div>
        <div class="type">${piece.backendProductInfo}<br>${piece.unitNumber} OF ${piece.unitCount}</div>
      </div>
      <div class="bottom">
        <span>${piece.vendorSku} ${piece.color} ${piece.size}</span>
        <span>${piece.oldSku}${piece.requiresBack?' / BACK':''}</span>
      </div>
    </div>`).join('');
}

async function markPrinted(){
  const data=await (await fetch('/api/manager/mark-printed',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      pieceIds:current.map(piece=>piece.pieceId),
      category:currentCategory,
      labelStock:currentStock
    })
  })).json();

  msg.innerHTML='<div class="success">✓ '+data.message+'</div>';
  labels.innerHTML='';
  loadAll();
}

async function loadGarments(){
  const rows=await (await fetch('/api/manager/garments?date='+date.value)).json();

  garments.innerHTML=rows.length
    ? '<table><tr><th>Vendor SKU</th><th>Garment</th><th>Color</th><th>Size</th><th>Qty</th></tr>'+
      rows.map(row=>`<tr><td>${row.vendorSku}</td><td>${row.garment}</td><td>${row.color}</td><td>${row.size}</td><td><b>${row.qty}</b></td></tr>`).join('')+
      '</table>'
    : 'No garment data.';
}

async function loadAll(){
  await loadSettings();
  await Promise.all([loadSummary(),loadGarments()]);
}

preview();
loadAll();
</script>
</main></div></body></html>
