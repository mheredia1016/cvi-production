<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>Backend</title><link rel="stylesheet" href="/styles.css"></head><body><div class="layout"><aside class="side"><div class="brand">ProductionOS</div><a class="" href="/dashboard.html">Dashboard</a><a class="active" href="/backend.html">Backend Control</a><a class="" href="/piece-labels.html">Piece Labels</a><a class="" href="/">Print Station</a><a class="" href="/qc.html">QC</a><a class="" href="/shipping.html">Shipping</a><a class="" href="/tracking.html">Tracking</a></aside><main class="main"><h1>Backend Control</h1><div class="card"><button onclick="preview()">Preview Ready</button><button onclick="imp()">Import + Mark In Production</button><a class="button secondary" href="/piece-labels.html">Print Piece Labels</a><div id="msg"></div></div><div class="grid"><div class="card"><h2>Ready Orders</h2><div id="ready"></div></div><div class="card"><h2>Garment Report</h2><div id="garments"></div></div></div><script>async function preview(){let r=await(await fetch('/api/shipstation/ready')).json();ready.innerHTML=r.length?'<table>'+r.map(o=>`<tr><td>${o.orderNumber}</td><td>${o.store}</td><td>${o.tags.join(', ')}</td></tr>`).join('')+'</table>':'No ready orders'}async function imp(){let d=await(await fetch('/api/import/ready',{method:'POST'})).json();msg.innerHTML='<p class="success">'+d.message+'</p>';preview();gar()}async function gar(){let r=await(await fetch('/api/reports/garments')).json();garments.innerHTML='<table>'+r.map(x=>`<tr><td>${x.vendorSku}</td><td>${x.color} ${x.size}</td><td><b>${x.qty}</b></td></tr>`).join('')+'</table>'}preview();gar()</script></main></div></body></html>
