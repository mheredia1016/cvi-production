<!doctype html><html><head><meta charset="utf-8"><title>Backend Control</title><meta name="viewport" content="width=device-width, initial-scale=1"><link rel="stylesheet" href="/styles.css"></head><body><div class="layout"><aside class="side"><div class="brand">PWT ProductionOS</div><a href="/">🖨️ Print Station</a><a href="/backend.html" class="active">🧠 Backend Control</a><a href="/shipping.html">📦 Shipping Scan</a><a href="/barcodes.html">🏷️ Barcode Sheets</a></aside><main class="main"><div class="topbar"><div><h1>Backend Control Station</h1><p>Garment reports, barcode sheets, and batch release</p></div></div><div class="card no-print"><button onclick="loadOrders()">Load Today's Batch</button><button onclick="releaseOrders()">Release to Production</button><a class="button secondary" href="/barcodes.html">Print Barcode Sheets</a><button class="secondary" onclick="window.print()">Print Garment Report</button><div id="msg"></div></div><section class="card"><h2>Garment Report</h2><div id="report">Loading...</div></section><section class="card no-print"><h2>Orders in Batch</h2><div id="orders">Loading...</div></section></main></div><script>async function loadReport(){const r=await fetch('/api/reports/garments');const rows=await r.json();report.innerHTML='<table><thead><tr><th>Garment</th><th>Color</th><th>Size</th><th>Qty Needed</th></tr></thead><tbody>'+rows.map(x=>`<tr><td>${x.garment}</td><td>${x.color}</td><td>${x.size}</td><td><b>${x.qty}</b></td></tr>`).join('')+'</tbody></table>';}async function loadOrders(){const r=await fetch('/api/orders');const rows=await r.json();orders.innerHTML='<table><thead><tr><th>Order</th><th>Store</th><th>Customer</th><th>Status</th><th>Items</th></tr></thead><tbody>'+rows.map(o=>`<tr><td>#${o.orderNumber}</td><td>${o.store}</td><td>${o.customer}</td><td>${o.status}</td><td>${o.items.length}</td></tr>`).join('')+'</tbody></table>';}async function releaseOrders(){const r=await fetch('/api/orders/release',{method:'POST'});const d=await r.json();msg.innerHTML='<div class="success">✓ '+d.message+'</div>';loadOrders();}loadReport();loadOrders();</script></body></html>
