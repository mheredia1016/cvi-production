<!doctype html><html><head><meta charset="utf-8"><title>Backend Control</title><meta name="viewport" content="width=device-width, initial-scale=1"><link rel="stylesheet" href="/styles.css"></head><body><div class="layout"><aside class="side"><div class="brand">ProductionOS</div><a href="/backend.html" class="active">🧠 Backend Control</a><a href="/label-center.html" class="">🏷️ Label Center</a><a href="/garments.html" class="">👕 Garment Report</a></aside><main class="main">
<div class="topbar"><div><h1>Backend Control</h1><p>Import ShipStation orders tagged Ready For Production.</p></div></div>
<section class="card">
  <button onclick="preview()">Preview Ready Orders</button>
  <button onclick="doImport()">Import + Change to In Production</button>
  <a class="button secondary" href="/label-center.html">Open Label Center</a>
  <div id="msg"></div>
</section>
<section class="card"><h2>Ready For Production</h2><div id="ready">Loading...</div></section>
<script>
async function preview(){
 const rows=await (await fetch('/api/shipstation/ready')).json();
 ready.innerHTML=rows.length?'<table><tr><th>Order</th><th>Custom Field 1</th><th>Backend Product Info</th><th>Tags</th></tr>'+rows.map(o=>`<tr><td>${o.orderNumber}</td><td>${o.customField1||''}</td><td>${o.items.map(i=>i.backendProductInfo).join(', ')}</td><td>${o.tags.join(', ')}</td></tr>`).join('')+'</table>':'No Ready For Production orders.';
}
async function doImport(){
 const d=await (await fetch('/api/import/ready',{method:'POST'})).json();
 msg.innerHTML='<div class="success">✓ '+d.message+'</div>';
 preview();
}
preview();
</script>
</main></div></body></html>
